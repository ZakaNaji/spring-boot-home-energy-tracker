spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/user_service_db
    username: user_service_user
    password: user_service_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081